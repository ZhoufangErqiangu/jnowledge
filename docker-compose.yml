# 开发期基础设施。一期 CRUD 闭环只需 Postgres + 对象存储（MinIO）。
# 注：一期不需要 pgvector/AGE 扩展（二期/三期再换带扩展的镜像）。
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: jnowledge
      POSTGRES_PASSWORD: jnowledge
      POSTGRES_DB: jnowledge
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jnowledge']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
