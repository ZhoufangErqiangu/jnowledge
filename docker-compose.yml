# 开发期基础设施。Postgres + 对象存储（MinIO）。
# 二期起 Postgres 改为本地构建镜像：pgvector（向量）+ zhparser（中文全文）。
# 扩展的启用（CREATE EXTENSION）在 Kysely migration 002 里，镜像只提供二进制。
services:
  postgres:
    build: ./infra/postgres
    environment:
      POSTGRES_USER: jnowledge
      POSTGRES_PASSWORD: jnowledge
      POSTGRES_DB: jnowledge
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jnowledge']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
