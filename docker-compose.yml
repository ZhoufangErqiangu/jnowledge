# 开发期基础设施。Postgres + 对象存储（MinIO）。
# 二期起 Postgres 改为本地构建镜像：pgvector（向量）+ zhparser（中文全文）。
# 扩展的启用（CREATE EXTENSION）在 Kysely migration 002 里，镜像只提供二进制。
services:
  postgres:
    build: ./infra/postgres
    environment:
      POSTGRES_USER: jnowledge
      POSTGRES_PASSWORD: jnowledge
      POSTGRES_DB: jnowledge
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jnowledge']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

  # --- 应用全栈（profile: app）。默认 `docker compose up` 仍只起上面的基础设施；
  #     部署/本地验证用 `docker compose --profile app up --build`。
  #     同镜像两入口：migrate 一次性跑迁移→退出，app 等其成功后再起服务。---

  # 一次性迁移/初始化容器：迁移到最新 + 幂等 seed admin，跑完即退出。
  migrate:
    profiles: [app]
    image: jnowledge-server:latest
    command: ['node', 'dist/db/migrate.js', 'latest']
    restart: 'no'
    env_file:
      - path: apps/server/.env
        required: false
    environment:
      # 容器网络内用服务名覆盖 .env 里的 localhost。
      DATABASE_URL: postgres://jnowledge:jnowledge@postgres:5432/jnowledge
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy

  # 服务容器：与 migrate 共用同一镜像（仅此服务声明 build）。
  app:
    profiles: [app]
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: jnowledge-server:latest
    command: ['node', 'dist/main.js']
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - path: apps/server/.env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://jnowledge:jnowledge@postgres:5432/jnowledge
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  # 前端：纯静态托管 SPA（不反代 API；API 路由由上游网关负责）。与 app 无运行期依赖。
  web:
    profiles: [app]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # 后端基址烘焙进 SPA；缺省空 = 同源（API 由上游网关反代）。
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    image: jnowledge-web:latest
    restart: unless-stopped
    ports:
      - '8080:80'

volumes:
  pgdata:
  miniodata:
