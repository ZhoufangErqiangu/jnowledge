# jnowledge 前端：纯静态托管 Vue SPA（history 模式）。
# 不反代 API —— API 路由由上游网关/ingress 负责（部署决策）。
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 编排健康检查用
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # 带 hash 的构建产物：长缓存 + immutable（文件名变才失效）
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA history fallback：未命中真实文件一律回 index.html，保证深链刷新可用
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 不缓存，发版即时生效（内部 fallback 重定向到此处时也命中）
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
